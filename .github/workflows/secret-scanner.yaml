name: Secret Scanner
on: [pull_request, push]
jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        run: |
          docker run --rm -v "${PWD}:/src" trufflesecurity/trufflehog:latest \
            git file:///src --results=verified,unknown --fail --exclude-paths .trufflehog-exclude.txt