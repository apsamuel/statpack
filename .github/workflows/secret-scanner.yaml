name: Secret Scanner
on: [pull_request, push]
jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        run: |
          EXCLUDE_FILE="${{ github.workspace }}/.trufflehog-exclude.txt"
          EXCLUDE_ARG=""
          if [ -f "$EXCLUDE_FILE" ]; then
            EXCLUDE_ARG="--exclude-paths /src/.trufflehog-exclude.txt"
          fi

          docker run --rm -v "${{ github.workspace }}:/src" trufflesecurity/trufflehog:latest \
            git file:///src --results=verified,unknown --fail $EXCLUDE_ARG