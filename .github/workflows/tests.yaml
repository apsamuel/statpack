name: Run Tests
on: [push]
env:
  GOV_API_BASE_URL: ${{ vars.GOV_API_BASE_URL }}
  GOV_API_KEY: ${{ secrets.GOV_API_KEY }}
  CENSUS_API_BASE_URL: ${{ vars.CENSUS_API_BASE_URL }}
  CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
jobs:
  run-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Pytests
        run: |
          python3 -m pytest -q